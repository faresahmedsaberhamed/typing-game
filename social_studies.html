<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Studies - Lingua Gravity Ultra</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&family=Share+Tech+Mono&family=Amiri:wght@400;700&family=VT323&display=swap" rel="stylesheet">
    <style>
        .lesson-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            max-width: 1000px;
            margin: 20px auto;
            background: var(--panel);
            border: 2px solid var(--primary);
            border-radius: var(--btn-radius);
            box-shadow: var(--ui-shadow);
            z-index: 5;
            position: relative;
        }

        .lesson-title {
            font-size: 40px;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
            margin-bottom: 20px;
            font-family: var(--font-title);
        }

        .lesson-content {
            font-size: 20px;
            line-height: 1.6;
            width: 100%;
            text-align: right; /* Arabic Layout */
            font-family: 'Amiri', serif;
        }

        .interactive-board {
            display: flex;
            width: 100%;
            gap: 20px;
            margin-top: 30px;
        }

        .chart-box, .map-box {
            flex: 1;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--secondary);
            border-radius: 10px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--secondary);
            font-weight: bold;
            font-size: 24px;
        }
    </style>
</head>
<body data-theme="earth">

    <div class="background-effects" id="bg-effects"></div>

    <!-- MAIN APP NAVIGATION -->
    <nav class="main-nav" id="main-nav">
        <div class="nav-logo">Lingua Gravity Ultra</div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Languages</a>
            <a href="social_studies.html" class="nav-link active">Social Studies (دراسات اجتماعية)</a>
            <a href="#" class="nav-link future-link" title="Coming Soon">Future Subjects</a>
        </div>
    </nav>

    <div class="lesson-container">
        <h1 class="lesson-title">Social Studies Hub</h1>
        <p class="lesson-content" style="text-align: center;">Waiting for lesson PDF to be uploaded...</p>
        
        <div class="interactive-board">
            <div class="map-box">🗺 Interactive Map Area</div>
            <div class="chart-box">📊 Interactive Charts Area</div>
        </div>

        <div class="btn-group" style="margin-top: 40px;">
            <button class="start-btn learn-btn" id="study-mode-btn">Start Study Mode</button>
            <button class="start-btn" id="practice-mode-btn">Start Practice Mode</button>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Reusing some global logic like background effects -->
    <script>
        const bgEffects = document.getElementById('bg-effects');
        function setBackgroundEffects(theme) {
            bgEffects.innerHTML = '';
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = `${Math.random() * 3}px`;
                star.style.height = star.style.width;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.animationDuration = `${Math.random() * 3 + 1}s`;
                bgEffects.appendChild(star);
            }
        }
        document.body.setAttribute('data-theme', localStorage.getItem('linguaTheme') || 'egypt');
        setBackgroundEffects(document.body.getAttribute('data-theme'));
    </script>
    <script src="social_studies.js"></script>
</body>
</html>
